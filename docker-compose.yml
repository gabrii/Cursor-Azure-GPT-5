x-build-args: &build_args
  INSTALL_PYTHON_VERSION: "3.13"

services:

  # ── Flask proxy (production mode, gunicorn + supervisord) ──────────────────
  flask:
    build:
      context: .
      target: production
      args:
        <<: *build_args
    image: "cursor-azure-gpt5"
    restart: unless-stopped
    env_file: .env                    # creds loaded at runtime, never baked in
    environment:
      FLASK_ENV: production
      FLASK_DEBUG: "0"
      LOG_LEVEL: info
      GUNICORN_WORKERS: "1"
    ports:
      - "127.0.0.1:5000:5000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Dev / management helpers (not started by default) ─────────────────────
  flask-dev:
    build:
      context: .
      target: development
      args:
        <<: *build_args
    image: "cursor-azure-gpt5-dev"
    env_file: .env
    ports:
      - "8082:5000"
    volumes:
      - ./:/app
    profiles: ["dev"]

  manage:
    entrypoint: flask
    image: "cursor-azure-gpt5-dev"
    env_file: .env
    stdin_open: true
    tty: true
    volumes:
      - ./:/app
    profiles: ["dev"]
