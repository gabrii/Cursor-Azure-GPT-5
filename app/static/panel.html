<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cursor Azure Proxy — Control Panel</title>
<style>
  :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #e6edf3; --dim: #8b949e; --accent: #58a6ff; --green: #3fb950; --orange: #d29922; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { width: 100%; max-width: 480px; padding: 20px; }
  h1 { font-size: 1.3rem; font-weight: 600; margin-bottom: 4px; }
  .subtitle { color: var(--dim); font-size: 0.85rem; margin-bottom: 24px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; font-weight: 500; background: var(--border); color: var(--dim); }
  .badge.active { background: #1f6feb33; color: var(--accent); }
  .levels { display: flex; gap: 6px; flex-wrap: wrap; }
  .level-btn { background: var(--bg); border: 1px solid var(--border); color: var(--dim); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: all 0.15s; }
  .level-btn:hover { border-color: var(--accent); color: var(--text); }
  .level-btn.selected { background: #1f6feb33; border-color: var(--accent); color: var(--accent); }
  .status { text-align: center; font-size: 0.8rem; color: var(--dim); padding: 8px; opacity: 0; transition: opacity 0.3s; }
  .status.show { opacity: 1; }
  .status.ok { color: var(--green); }
  .status.err { color: #f85149; }
</style>
</head>
<body>
<div class="container">
  <h1>Reasoning Effort</h1>
  <p class="subtitle">Changes apply to the next Cursor request instantly.</p>

  <div class="card" data-model="gpt-5.4">
    <h2>gpt-5.4 <span class="badge active" id="badge-gpt-5.4">medium</span></h2>
    <div class="levels">
      <button class="level-btn" data-effort="none">none</button>
      <button class="level-btn" data-effort="low">low</button>
      <button class="level-btn selected" data-effort="medium">medium</button>
      <button class="level-btn" data-effort="high">high</button>
      <button class="level-btn" data-effort="xhigh">xhigh</button>
    </div>
  </div>

  <div class="card" data-model="gpt-5.4-mini">
    <h2>gpt-5.4-mini <span class="badge active" id="badge-gpt-5.4-mini">medium</span></h2>
    <div class="levels">
      <button class="level-btn" data-effort="none">none</button>
      <button class="level-btn" data-effort="low">low</button>
      <button class="level-btn selected" data-effort="medium">medium</button>
      <button class="level-btn" data-effort="high">high</button>
      <button class="level-btn" data-effort="xhigh">xhigh</button>
    </div>
  </div>

  <div class="status" id="status"></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  // Load current settings on page load
  fetch('/settings')
    .then(r => r.json())
    .then(data => {
      for (const [model, effort] of Object.entries(data)) {
        const card = document.querySelector(`.card[data-model="${model}"]`);
        if (!card) continue;
        card.querySelectorAll('.level-btn').forEach(b => {
          b.classList.toggle('selected', b.dataset.effort === effort);
        });
        const badge = document.getElementById(`badge-${model}`);
        if (badge) badge.textContent = effort;
      }
    })
    .catch(() => {});

  // Handle clicks
  document.querySelectorAll('.level-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const card = btn.closest('.card');
      const model = card.dataset.model;
      const effort = btn.dataset.effort;

      // Update UI immediately
      card.querySelectorAll('.level-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      const badge = document.getElementById(`badge-${model}`);
      if (badge) badge.textContent = effort;

      // Send to server
      const status = document.getElementById('status');
      fetch('/settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model, effort })
      })
      .then(r => r.json())
      .then(() => {
        status.textContent = `${model} → ${effort}`;
        status.className = 'status show ok';
        setTimeout(() => status.className = 'status', 2000);
      })
      .catch(() => {
        status.textContent = 'Failed to save';
        status.className = 'status show err';
        setTimeout(() => status.className = 'status', 2000);
      });
    });
  });
});
</script>
</body>
</html>
